<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceLead AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 800px; }
        .call-interface {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden; display: flex; flex-direction: column;
            height: 90vh; max-height: 900px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px 20px; text-align: center;
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .connection-status {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 10px; padding: 6px 12px;
            background: rgba(255, 255, 255, 0.2); border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e; animation: pulse 2s infinite;
        }
        .status-dot.disconnected { background: #ef4444; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .content {
            flex: 1; display: flex; flex-direction: column;
            overflow-y: auto; padding: 20px; background: #f9fafb;
        }
        .conversation {
            flex: 1; margin-bottom: 20px; display: flex; flex-direction: column;
            gap: 12px; overflow-y: auto; padding-right: 10px;
        }
        .message { display: flex; gap: 12px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message-bubble {
            max-width: 70%; padding: 12px 16px; border-radius: 12px;
            font-size: 14px; line-height: 1.5; word-wrap: break-word;
        }
        .message.user .message-bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; }
        .message.agent .message-bubble { background: #e0e7ff; color: #312e81; border-bottom-left-radius: 4px; }
        .message-label { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 4px; }
        .message.user .message-label { text-align: right; }
        
        .lead-qualification {
            background: white; padding: 15px; border-radius: 12px;
            border: 2px solid #667eea; margin-bottom: 15px;
        }
        .lead-qualification h3 {
            color: #667eea; font-size: 12px; text-transform: uppercase;
            font-weight: 700; margin-bottom: 10px; letter-spacing: 0.5px;
        }
        .qual-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid #f3f4f6; font-size: 13px; color: #333;
        }
        .qual-row:last-child { border-bottom: none; }
        .qual-label { color: #999; font-weight: 500; }
        .qual-value { font-weight: 600; color: #333; }
        
        .controls {
            padding: 20px; background: white; border-top: 1px solid #e5e7eb;
            display: flex; flex-direction: column; gap: 12px;
        }
        .mic-button {
            width: 100%; height: 70px; border: 3px solid #667eea;
            background: #667eea; color: white; border-radius: 16px;
            font-size: 18px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center;
            justify-content: center; gap: 10px;
        }
        .mic-button:hover:not(.recording) { background: #5568d3; border-color: #5568d3; transform: translateY(-2px); }
        .mic-button.recording { background: #ef4444; border-color: #ef4444; animation: recordPulse 1s infinite; }
        @keyframes recordPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
        .button-group { display: flex; gap: 10px; }
        .secondary-btn {
            flex: 1; padding: 12px; border: 2px solid #e5e7eb; background: white;
            color: #333; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .secondary-btn:hover { border-color: #667eea; color: #667eea; }
        .empty-state { text-align: center; color: #999; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="call-interface">
            <div class="header">
                <h1>🎯 VoiceLead AI</h1>
                <p>Real-Time Lead Qualification</p>
                <div class="connection-status">
                    <span class="status-dot disconnected" id="connectionDot"></span>
                    <span id="connectionText">Disconnected</span>
                </div>
            </div>

            <div class="content">
                <div class="lead-qualification" id="leadQualification" style="display: none;">
                    <h3>📊 Lead Profile</h3>
                    <div class="qual-row"><span class="qual-label">Budget</span><span class="qual-value" id="qualBudget">-</span></div>
                    <div class="qual-row"><span class="qual-label">Property Type</span><span class="qual-value" id="qualProperty">-</span></div>
                    <div class="qual-row"><span class="qual-label">Location</span><span class="qual-value" id="qualLocation">-</span></div>
                    <div class="qual-row"><span class="qual-label">Score</span><span class="qual-value" id="qualScore">-</span></div>
                </div>

                <div class="conversation" id="conversation">
                    <div class="empty-state" id="emptyState">
                        <p>👋 Click "Start Call" to begin</p>
                        <p style="font-size: 13px; opacity: 0.8;">The AI will listen continuously</p>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="mic-button" id="micButton" onclick="toggleCall()">
                    <span class="mic-icon">📞</span>
                    <span id="micLabel">Start Call</span>
                </button>
                <div class="button-group">
                    <button class="secondary-btn" onclick="location.reload()">Reset Session</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            ws: null,
            mediaRecorder: null,
            audioContext: null,
            processor: null,
            isCallActive: false
        };

        function toggleCall() {
            if (state.isCallActive) {
                endCall();
            } else {
                startCall();
            }
        }

        async function startCall() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Connect WebSocket to our Phase 4 route
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                state.ws = new WebSocket(`${protocol}//${window.location.host}/ws/browser`);
                state.ws.binaryType = 'arraybuffer';

                state.ws.onopen = () => {
                    document.getElementById('connectionDot').classList.remove('disconnected');
                    document.getElementById('connectionText').textContent = 'Connected';
                    
                    // UI Updates
                    document.getElementById('micButton').classList.add('recording');
                    document.getElementById('micLabel').textContent = 'Hang Up';
                    document.getElementById('emptyState').style.display = 'none';
                    state.isCallActive = true;

                    startAudioStreaming(stream);
                };

                state.ws.onmessage = (event) => {
                    if (event.data instanceof ArrayBuffer) {
                        playAudioStream(event.data);
                    } else {
                        const data = JSON.parse(event.data);
                        handleServerData(data);
                    }
                };

                state.ws.onclose = endCall;

            } catch (err) {
                console.error("Microphone access denied:", err);
                alert("Please allow microphone access to start the call.");
            }
        }

        function endCall() {
            state.isCallActive = false;
            
            // Safely close WebSocket
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.close();
            }
            
            // Safely disconnect processor
            if (state.processor) {
                state.processor.disconnect();
                state.processor = null;
            }
            
            // ✅ THE FIX: Only close the audio context if it's currently running
            if (state.audioContext && state.audioContext.state !== 'closed') {
                state.audioContext.close().catch(e => console.log("Audio close ignored:", e));
            }

            // Reset UI
            document.getElementById('connectionDot').classList.add('disconnected');
            document.getElementById('connectionText').textContent = 'Disconnected';
            document.getElementById('micButton').classList.remove('recording');
            document.getElementById('micLabel').textContent = 'Start Call';
            
            // Optional: Show empty state again
            document.getElementById('emptyState').style.display = 'block';
        }

        function startAudioStreaming(stream) {
            state.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = state.audioContext.createMediaStreamSource(stream);
            state.processor = state.audioContext.createScriptProcessor(4096, 1, 1);

            state.processor.onaudioprocess = (e) => {
                if (!state.isCallActive || state.ws.readyState !== WebSocket.OPEN) return;
                
                // Convert Float32 to Int16 PCM (Deepgram standard)
                const pcm = e.inputBuffer.getChannelData(0);
                const buffer = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) {
                    buffer[i] = Math.min(1, pcm[i]) < 0 ? pcm[i] * 0x8000 : pcm[i] * 0x7FFF;
                }
                state.ws.send(buffer.buffer);
            };

            source.connect(state.processor);
            state.processor.connect(state.audioContext.destination);
        }

        // Simple audio queue for playback
        const audioQueue = [];
        let isPlaying = false;

        function playAudioStream(arrayBuffer) {
            audioQueue.push(arrayBuffer);
            if (!isPlaying) processAudioQueue();
        }

        async function processAudioQueue() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                return;
            }
            isPlaying = true;
            const data = audioQueue.shift();
            
            // Note: In production, you'd decode PCM here. 
            // For Deepgram MP3 chunks, we can use a Blob URL:
            const blob = new Blob([data], { type: 'audio/mp3' });
            const audio = new Audio(URL.createObjectURL(blob));
            
            audio.onended = processAudioQueue;
            audio.play().catch(e => {
                console.error("Audio playback failed", e);
                processAudioQueue();
            });
        }

        function handleServerData(data) {
            if (data.call_ended) {
                endCall();
                return;
            }
            if (data.user_text) {
                addMessage('user', data.user_text);
            }
            if (data.ai_text) {
                addMessage('agent', data.ai_text);
            }
            if (data.lead_update) {
                document.getElementById('leadQualification').style.display = 'block';
                document.getElementById('qualBudget').textContent = data.lead_update.budget || '-';
                document.getElementById('qualProperty').textContent = data.lead_update.property_type || '-';
                document.getElementById('qualLocation').textContent = data.lead_update.location || '-';
                document.getElementById('qualScore').textContent = data.lead_update.score || '-';
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div>
                    <div class="message-label">${role === 'user' ? 'You' : '🤖 AI Agent'}</div>
                    <div class="message-bubble">${text}</div>
                </div>
            `;
            const container = document.getElementById('conversation');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
