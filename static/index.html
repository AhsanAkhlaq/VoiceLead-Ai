<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceLead AI - Real-Time Lead Qualification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .call-interface {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 900px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .conversation {
            flex: 1;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .conversation::-webkit-scrollbar {
            width: 6px;
        }

        .conversation::-webkit-scrollbar-track {
            background: #e5e7eb;
            border-radius: 3px;
        }

        .conversation::-webkit-scrollbar-thumb {
            background: #9ca3af;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-bubble {
            background: #e0e7ff;
            color: #312e81;
            border-bottom-left-radius: 4px;
        }

        .message-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 4px;
        }

        .message.user .message-label {
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e0e7ff;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; }
        }

        .lead-score-display {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            border: 2px solid #e5e7eb;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .score-value.budget {
            color: #22c55e;
        }

        .score-value.property {
            color: #3b82f6;
        }

        .score-value.timeline {
            color: #f59e0b;
        }

        .lead-qualification {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #667eea;
            margin-bottom: 15px;
        }

        .lead-qualification h3 {
            color: #667eea;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .qual-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
            color: #333;
        }

        .qual-row:last-child {
            border-bottom: none;
        }

        .qual-label {
            color: #999;
            font-weight: 500;
        }

        .qual-value {
            font-weight: 600;
            color: #333;
        }

        .lead-score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-right: 6px;
        }

        .lead-score-badge.hot {
            background: #fee2e2;
            color: #991b1b;
        }

        .lead-score-badge.warm {
            background: #fef3c7;
            color: #92400e;
        }

        .lead-score-badge.cold {
            background: #dbeafe;
            color: #1e40af;
        }

        .lead-score-badge.unknown {
            background: #f3f4f6;
            color: #6b7280;
        }

        .controls {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mic-button {
            width: 100%;
            height: 70px;
            border: 3px solid #667eea;
            background: #667eea;
            color: white;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .mic-button:hover:not(.recording) {
            background: #5568d3;
            border-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .mic-button.recording {
            background: #ef4444;
            border-color: #ef4444;
            animation: recordPulse 1s infinite;
        }

        @keyframes recordPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }
        }

        .mic-icon {
            font-size: 24px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            background: white;
            color: #333;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .secondary-btn:active {
            background: #f9fafb;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .empty-state .subtext {
            font-size: 13px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .call-interface {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .message-bubble {
                max-width: 85%;
            }

            .lead-score-display {
                grid-template-columns: 1fr;
            }

            .mic-button {
                height: 60px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="call-interface">
            <div class="header">
                <h1>🎯 VoiceLead AI</h1>
                <p>Real-Time Lead Qualification</p>
                <div class="connection-status">
                    <span class="status-dot" id="connectionDot"></span>
                    <span id="connectionText">Connecting...</span>
                </div>
            </div>

            <div class="content">
                <div class="lead-qualification" id="leadQualification" style="display: none;">
                    <h3>📊 Lead Qualification In Progress</h3>
                    <div class="qual-row">
                        <span class="qual-label">Budget</span>
                        <span class="qual-value" id="qualBudget">-</span>
                    </div>
                    <div class="qual-row">
                        <span class="qual-label">Property Type</span>
                        <span class="qual-value" id="qualProperty">-</span>
                    </div>
                    <div class="qual-row">
                        <span class="qual-label">Timeline</span>
                        <span class="qual-value" id="qualTimeline">-</span>
                    </div>
                    <div class="qual-row">
                        <span class="qual-label">Location</span>
                        <span class="qual-value" id="qualLocation">-</span>
                    </div>
                    <div class="qual-row">
                        <span class="qual-label">Lead Score</span>
                        <span class="qual-value">
                            <span class="lead-score-badge unknown" id="qualScore">UNKNOWN</span>
                        </span>
                    </div>
                </div>

                <div class="conversation" id="conversation">
                    <div class="empty-state">
                        <p>👋 Hold the microphone button and speak</p>
                        <p class="subtext">The AI agent will respond in real-time</p>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="mic-button" id="micButton" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">
                    <span class="mic-icon">🎤</span>
                    <span id="micLabel">Hold to Speak</span>
                </button>
                <div class="button-group">
                    <button class="secondary-btn" onclick="endCall()">End Call</button>
                    <button class="secondary-btn" onclick="transferToAgent()">Transfer to Agent</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // STATE MANAGEMENT
        // ============================================================================
        const state = {
            ws: null,
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false,
            isConnected: false,
            currentLeadId: null,
            leadProfile: {
                budget: null,
                property_type: null,
                timeline: null,
                location: null,
                score: 'UNKNOWN'
            }
        };

        // ============================================================================
        // WEBSOCKET CONNECTION
        // ============================================================================
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            state.ws = new WebSocket(wsUrl);

            state.ws.onopen = () => {
                console.log('✅ WebSocket connected');
                setConnectionStatus(true);
            };

            state.ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            state.ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
                setConnectionStatus(false);
            };

            state.ws.onclose = () => {
                console.log('❌ WebSocket disconnected');
                setConnectionStatus(false);
                // Attempt to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }

        function setConnectionStatus(connected) {
            state.isConnected = connected;
            const dot = document.getElementById('connectionDot');
            const text = document.getElementById('connectionText');

            if (connected) {
                dot.classList.remove('disconnected');
                text.textContent = 'Connected';
            } else {
                dot.classList.add('disconnected');
                text.textContent = 'Disconnected';
            }
        }

        // ============================================================================
        // AUDIO RECORDING
        // ============================================================================
        async function startRecording() {
            if (!state.isConnected) {
                alert('Not connected to server. Please wait...');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                const mediaRecorder = new MediaRecorder(stream);
                state.mediaRecorder = mediaRecorder;
                state.audioChunks = [];
                state.isRecording = true;

                updateMicButton(true);

                mediaRecorder.ondataavailable = (event) => {
                    state.audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(state.audioChunks, { type: 'audio/webm' });
                    sendAudioToServer(audioBlob);
                };

                mediaRecorder.start();
            } catch (error) {
                console.error('❌ Microphone access denied:', error);
                alert('Please allow microphone access to use VoiceLead AI');
            }
        }

        function stopRecording() {
            if (state.isRecording && state.mediaRecorder) {
                state.mediaRecorder.stop();
                state.mediaRecorder.stream.getTracks().forEach(track => track.stop());
                state.isRecording = false;
                updateMicButton(false);
            }
        }

        function updateMicButton(recording) {
            const btn = document.getElementById('micButton');
            const label = document.getElementById('micLabel');

            if (recording) {
                btn.classList.add('recording');
                label.textContent = 'Recording...';
            } else {
                btn.classList.remove('recording');
                label.textContent = 'Hold to Speak';
            }
        }

        // ============================================================================
        // SEND AUDIO TO SERVER
        // ============================================================================
        async function sendAudioToServer(audioBlob) {
            if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
                console.error('WebSocket not ready');
                return;
            }

            try {
                const reader = new FileReader();
                reader.readAsArrayBuffer(audioBlob);
                reader.onload = () => {
                    state.ws.send(reader.result);
                };
            } catch (error) {
                console.error('❌ Error sending audio:', error);
            }
        }

        // ============================================================================
        // HANDLE SERVER MESSAGES
        // ============================================================================
        function handleMessage(data) {
            console.log('📨 Received message:', data);

            // Display agent response
            if (data.agent_response) {
                addMessage('agent', data.agent_response);
                // Play audio if available
                if (data.audio_base64) {
                    playAudio(data.audio_base64);
                }
            }

            // Display user transcription
            if (data.user_transcription) {
                addMessage('user', data.user_transcription);
            }

            // Update lead profile
            if (data.lead_update) {
                updateLeadProfile(data.lead_update);
            }

            // Store lead ID
            if (data.lead_id) {
                state.currentLeadId = data.lead_id;
            }
        }

        // ============================================================================
        // UI UPDATES
        // ============================================================================
        function addMessage(role, text) {
            const conversation = document.getElementById('conversation');

            // Clear empty state if exists
            const emptyState = conversation.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div>
                    <div class="message-label">${role === 'user' ? 'You' : '🤖 AI Agent'}</div>
                    <div class="message-bubble">${escapeHtml(text)}</div>
                </div>
            `;

            conversation.appendChild(messageDiv);
            conversation.scrollTop = conversation.scrollHeight;
        }

        function updateLeadProfile(updates) {
            // Update state
            Object.assign(state.leadProfile, updates);

            // Show qualification panel
            const qualDiv = document.getElementById('leadQualification');
            qualDiv.style.display = 'block';

            // Update values
            document.getElementById('qualBudget').textContent = state.leadProfile.budget || '-';
            document.getElementById('qualProperty').textContent = state.leadProfile.property_type || '-';
            document.getElementById('qualTimeline').textContent = state.leadProfile.timeline || '-';
            document.getElementById('qualLocation').textContent = state.leadProfile.location || '-';

            // Update score badge
            const scoreElement = document.getElementById('qualScore');
            scoreElement.textContent = state.leadProfile.score || 'UNKNOWN';
            scoreElement.className = `lead-score-badge ${(state.leadProfile.score || 'unknown').toLowerCase()}`;
        }

        function playAudio(audioBase64) {
            try {
                const audioBytes = Uint8Array.from(atob(audioBase64), c => c.charCodeAt(0));
                const audioBlob = new Blob([audioBytes], { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play().catch(err => console.error('Error playing audio:', err));
            } catch (error) {
                console.error('❌ Error playing audio:', error);
            }
        }

        // ============================================================================
        // ACTION BUTTONS
        // ============================================================================
        function endCall() {
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.send(JSON.stringify({ action: 'end_call' }));
            }
            // Reload page or show end call message
            alert('Call ended. Thank you for using VoiceLead AI!');
            location.reload();
        }

        function transferToAgent() {
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.send(JSON.stringify({ action: 'transfer_to_agent', lead_id: state.currentLeadId }));
            }
            alert('Transferring to a sales agent...');
        }

        // ============================================================================
        // UTILITIES
        // ============================================================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
        });

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (state.ws) {
                state.ws.close();
            }
        });
    </script>
</body>
</html>
